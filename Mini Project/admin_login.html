<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Admin Login</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-auth-page">
<div class="background-animation"></div>
<header class="navbar admin-nav">
    <div class="nav-brand">Admin Panel</div>
    <nav>
        <a href="index.html" class="back-btn">Home</a>
    </nav>
</header>
    <div class="auth-container">
        <h2>Admin Login</h2>
        <p class="auth-subtitle">Access the admin console with the same clean light interface.</p>
        <form id="adminLoginForm">
            <label>Username
                <input id="adminUsername" name="username" type="text" required>
            </label>
            <label>Password
                <input id="adminPassword" name="password" type="password" required>
            </label>
            <div class="auth-actions">
                <button class="primary-btn" type="submit">Login</button>
                <a class="btn register-btn" href="admin_register.html">Register</a>
            </div>
        </form>
    </div>
    <script src="auth.js"></script>
    <script src="admin_auth.js"></script>
</body>
</html>
