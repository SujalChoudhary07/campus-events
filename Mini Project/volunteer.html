<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="auth.js"></script>
    <script defer src="volunteer.js"></script>
</head>
<body>
    <div class="background-animation"></div>
    <header class="navbar">
        <nav>
            <a href="index.html">Home</a>
            <button id="themeToggle" class="btn-secondary">Dark Mode</button>
            <a href="#" id="logoutLink" class="login-btn">Logout</a>
        </nav>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>EventCMS (Volunteer)</h2>
            <div id="sidebarUser" class="sidebar-user"></div>
            <ul>
                <li><a href="#" data-section="home">Dashboard</a></li>
                <li><a href="#" data-section="tasks">My Tasks</a></li>
                <li><a href="#" data-section="events">Assigned Events</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <section id="home" class="section">
                <h2 id="welcomeMsg"></h2>
                <p>Use the menu to navigate the dashboard features.</p>
            </section>
            <section id="tasks" class="section hidden">
                <h2 class="section-title">My Tasks</h2>
                <div id="taskList" class="task-table-wrap"></div>
            </section>
            <section id="events" class="section hidden">
                <h2 class="section-title">Assigned Events</h2>
                <div class="event-container" id="eventContainer"></div>
            </section>
        </main>
    </div>

</body>
</html>
